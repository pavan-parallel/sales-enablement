<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 4 — focus &amp; dim (large)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FFFFFF;--ink:#17161A;--mut:#6C6B70;--lab:#9B9BA1;
  --line:rgba(20,19,24,.11);--line2:rgba(20,19,24,.20);
  --indigo:#4E61D6;
  --f:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --mx:6.2vw;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--ink);font-family:var(--f);-webkit-font-smoothing:antialiased}

.stage{position:absolute;inset:0;padding:13vh var(--mx) 0;overflow:hidden}
.rl{position:absolute;top:5.6vh;left:var(--mx);font-size:14px;font-weight:500;color:var(--lab)}
.rr{position:absolute;top:5.6vh;right:var(--mx);font-size:14px;font-weight:500;color:var(--lab)}
h2{font-weight:500;font-size:clamp(34px,4.5vw,70px);line-height:1.05;letter-spacing:-.028em;max-width:19ch}
.sub{font-size:clamp(17px,1.35vw,21px);color:var(--mut);margin-top:18px}
.hint{font-size:13px;color:var(--lab);margin-top:10px}

/* cards */
.card{position:absolute;border-radius:14px;overflow:hidden;background:#fff;border:1px solid var(--line);
  box-shadow:0 26px 64px -38px rgba(0,0,0,.45);cursor:pointer;will-change:transform,opacity;
  transition:transform .36s cubic-bezier(.25,.9,.3,1),box-shadow .36s ease,filter .36s ease,opacity .36s ease}
.card img{width:100%;height:100%;object-fit:cover;object-position:top left;display:block;pointer-events:none}

/* focus & dim — large, end screens bleed off the edges */
.stage .card{width:52vw;aspect-ratio:8/5;top:40vh}
.c1{left:-18vw;transform:rotate(-4deg);z-index:1}
.c2{left:10vw;transform:rotate(-1.5deg);z-index:2}
.c3{left:38vw;transform:rotate(1.5deg);z-index:3}
.c4{left:66vw;transform:rotate(4deg);z-index:4}
.stage.dim .card{opacity:.5;filter:saturate(.92)}
.stage.dim .c1:hover,.stage.dim .c1.up,
.stage.dim .c2:hover,.stage.dim .c2.up,
.stage.dim .c3:hover,.stage.dim .c3.up,
.stage.dim .c4:hover,.stage.dim .c4.up{opacity:1;filter:none;
  transform:rotate(0deg) translateY(-22px) scale(1.04);z-index:20;
  box-shadow:0 50px 110px -34px rgba(0,0,0,.5)}
</style>
</head>
<body>

<section class="stage" id="pile">
  <span class="rl">The brief</span><span class="rr">Sequifi × Parallel</span>
  <h2>Over the years, features piled up.</h2>
  <p class="sub">Screens got dense, and no two looked alike.</p>
  <p class="hint">Point at any screen — it brightens and lifts while the rest fall back. Hover the exposed edge of one behind to bring it forward.</p>
  <div class="card c1"><img src="assets/Old%20Screenshot%2001.png" alt=""></div>
  <div class="card c2"><img src="assets/Old%20Screenshot%2002.png" alt=""></div>
  <div class="card c3"><img src="assets/Old%20Screenshot%2003.png" alt=""></div>
  <div class="card c4"><img src="assets/Old%20Screenshot%2004.png" alt=""></div>
</section>

<script>
const pile=document.getElementById('pile');
pile.addEventListener('mouseenter',()=>pile.classList.add('dim'));
pile.addEventListener('mouseleave',()=>{pile.classList.remove('dim');pile.querySelectorAll('.card').forEach(c=>c.classList.remove('up'));});
// click / tap to hold focus (for touch)
pile.querySelectorAll('.card').forEach(c=>c.addEventListener('click',e=>{
  e.stopPropagation();
  pile.classList.add('dim');
  const was=c.classList.contains('up');
  pile.querySelectorAll('.card').forEach(x=>x.classList.remove('up'));
  if(!was)c.classList.add('up');
}));
</script>
</body>
</html>
